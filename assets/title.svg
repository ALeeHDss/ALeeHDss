

<svg width="400" height="250">
  <style>
    .label { font: 14px sans-serif; fill: #fff; }
  </style>

  <!-- Lua -->
  <rect x="10" y="10" width="20%" height="40" fill="#ff8700" rx="10" ry="10" />
  <text x="15%" y="70" class="label">Lua</text>

  <!-- HTML -->
  <rect x="30%" y="10" width="25%" height="40" fill="#f0f0f0" rx="10" ry="10" />
  <text x="37.5%" y="70" class="label">HTML</text>

  <!-- CSS -->
  <rect x="55%" y="10" width="15%" height="40" fill="#8a3b8a" rx="10" ry="10" />
  <text x="58%" y="70" class="label">CSS</text>

  <!-- Python -->
  <rect x="70%" y="10" width="30%" height="40" fill="#4b8bbc" rx="10" ry="10" />
  <text x="75%" y="70" class="label">Python</text>

  <!-- Leyenda -->
  <g transform="translate(10, 200)">
    <!-- Lua -->
    <rect x="0" y="0" width="20" height="20" fill="#ff8700" rx="5" ry="5" />
    <text x="25" y="15" class="label">Lua</text>

    <!-- HTML -->
    <rect x="70" y="0" width="20" height="20" fill="#f0f0f0" rx="5" ry="5" />
    <text x="95" y="15" class="label">HTML</text>

    <!-- CSS -->
    <rect x="140" y="0" width="20" height="20" fill="#8a3b8a" rx="5" ry="5" />
    <text x="165" y="15" class="label">CSS</text>

    <!-- Python -->
    <rect x="210" y="0" width="20" height="20" fill="#4b8bbc" rx="5" ry="5" />
    <text x="235" y="15" class="label">Python</text>
  </g>
</svg>
